default:
  runtime:
    slug: "mmBayes"
    root: "~/Workspaces/mmbayes/runtime"
    exports_root: "~/Workspaces/mmbayes/runtime/exports"
  data:
    team_features_path: "~/Library/CloudStorage/OneDrive-Personal/SideProjects/mmBayes/data/pre_tournament_team_features.xlsx"
    game_results_path: "~/Library/CloudStorage/OneDrive-Personal/SideProjects/mmBayes/data/tournament_game_results.xlsx"
  model:
    history_window: 8
    backtest: true
    engine: "stan_glm"
    compare_engines: true
    allow_unavailable_comparison: false
    ensemble:
      enabled: true
      component_engines:
        - "stan_glm"
        - "bart"
      combiner: "logit_weight"
      primary_acceptance_target: "bracket_score"
      log_loss_guardrail_delta: 0.005
      brier_guardrail_delta: 0.005
    bart:
      n_trees: 200
      n_burn: 500
      n_post: 1000
      k: 2
      power: 2
    required_predictors:
      - round
      - same_conf
      - seed_diff
      - barthag_logit_diff
      - AdjOE_diff
      - AdjDE_diff
      - WAB_diff
      - TOR_diff
      - TORD_diff
      - ORB_diff
      - DRB_diff
      - 3P%_diff
      - 3P%D_diff
      - Adj T._diff
    interaction_terms:
      - "barthag_logit_diff:round"
      - "seed_diff:round"
    prior_type: "normal"
    random_seed: 42
    n_draws: 1000
  output:
    path: "~/Workspaces/mmbayes/runtime/output"
    prefix: "tournament_sim"
    model_cache_path: "~/Workspaces/mmbayes/runtime/output/model_cache"
    log_path: "~/Workspaces/mmbayes/runtime/output/logs/tournament_simulation.log"
    refresh_log_path: "~/Workspaces/mmbayes/runtime/output/logs/data_refresh.log"
