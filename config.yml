default:
  runtime:
    slug: "mmBayes"
    root: "~/ProjectsRuntime/mmBayes"
    exports_root: "~/ProjectsRuntime/mmBayes/exports"
  data:
    team_features_path: "~/Library/CloudStorage/OneDrive-Personal/SideProjects/mmBayes/data/pre_tournament_team_features.xlsx"
    game_results_path: "~/Library/CloudStorage/OneDrive-Personal/SideProjects/mmBayes/data/tournament_game_results.xlsx"
  model:
    history_window: 8
    backtest: true
    engine: "stan_glm"
    bart:
      n_trees: 200
      n_burn: 500
      n_post: 1000
      k: 2
      power: 2
    required_predictors:
      - round
      - same_conf
      - seed_diff
      - barthag_logit_diff
      - AdjOE_diff
      - AdjDE_diff
      - WAB_diff
      - TOR_diff
      - TORD_diff
      - ORB_diff
      - DRB_diff
      - 3P%_diff
      - 3P%D_diff
      - Adj T._diff
      - betting_prob_centered
      - betting_spread_teamA
      - betting_bookmakers
      - betting_line_available
      - betting_minutes_before_commence
      - betting_prob_dispersion
      - betting_spread_dispersion
    interaction_terms:
      - "barthag_logit_diff:round"
      - "seed_diff:round"
    prior_type: "normal"
    random_seed: 42
    n_draws: 1000
  betting:
    enabled: true
    provider: "odds_api"
    api_key_env: "ODDS_API_KEY"
    sport_key: "basketball_ncaab"
    regions: "us"
    markets:
      - "h2h"
      - "spreads"
    bookmakers:
      - "draftkings"
      - "fanduel"
      - "betmgm"
      - "betrivers"
    odds_format: "american"
    date_format: "iso"
    history_dir: "~/ProjectsRuntime/mmBayes/data/odds_history"
    fetch_policy: "if_missing"
    snapshot_cooldown_minutes: 10
    require_for_production: false
    allow_missing_fallback: true
    evaluation_mode: "ablation"
  output:
    path: "~/ProjectsRuntime/mmBayes/output"
    prefix: "tournament_sim"
    model_cache_path: "~/ProjectsRuntime/mmBayes/output/model_cache"
    log_path: "~/ProjectsRuntime/mmBayes/output/logs/tournament_simulation.log"
    refresh_log_path: "~/ProjectsRuntime/mmBayes/output/logs/data_refresh.log"
