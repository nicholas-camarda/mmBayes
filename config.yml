default:
  data_path: "data/bayesian_model_data.xlsx"
  metrics_to_use:
    - overall_strength
    - barthag_logit
    - AdjOE
    - AdjDE
    - Clutch_Index
    - Conf_Strength
    - Upset_Factor
    - Turnover_Edge
  model:
    required_metrics:
      - overall_strength
      - barthag_logit
      - AdjOE
      - AdjDE
      - Clutch_Index
      - Conf_Strength
      - Upset_Factor
      - Turnover_Edge
    random_seed: 42
    n_draws: 1000
  output:
    path: "output"
    prefix: "tournament_sim"
