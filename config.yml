default:
  data:
    team_features_path: "data/pre_tournament_team_features.xlsx"
    game_results_path: "data/tournament_game_results.xlsx"
  model:
    history_window: 8
    backtest: true
    required_predictors:
      - round
      - same_conf
      - seed_diff
      - barthag_logit_diff
      - AdjOE_diff
      - AdjDE_diff
      - WAB_diff
      - TOR_diff
      - TORD_diff
      - ORB_diff
      - DRB_diff
      - 3P%_diff
      - 3P%D_diff
      - Adj T._diff
    random_seed: 42
    n_draws: 1000
  betting:
    enabled: true
    provider: "odds_api"
    api_key_env: "ODDS_API_KEY"
    sport_key: "basketball_ncaab"
    regions: "us"
    markets:
      - "h2h"
      - "spreads"
    bookmakers:
      - "draftkings"
      - "fanduel"
      - "betmgm"
      - "betrivers"
    odds_format: "american"
    date_format: "iso"
    history_dir: "data/odds_history"
    fetch_policy: "if_missing"
    blend_weight: 0.35
    blend_rounds:
      - "Round of 64"
  output:
    path: "output"
    prefix: "tournament_sim"
    model_cache_path: "output/model_cache"
    log_path: "output/logs/tournament_simulation.log"
    refresh_log_path: "output/logs/data_refresh.log"
